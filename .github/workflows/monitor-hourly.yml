name: Dashboard Alerts Hourly Monitor

on:
  workflow_dispatch:
  schedule:
    # Runs hourly from 09:00 IST to 23:00 IST (GitHub Actions uses UTC)
    # 09:00 IST = 03:30 UTC, 23:00 IST = 17:30 UTC
    - cron: '30 3-17 * * *'

permissions:
  contents: read

jobs:
  run-monitor:
    runs-on: self-hosted
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run monitor
        run: npm run monitor:run

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-reports-${{ github.run_number }}
          path: |
            reports/**
            data/**
            logs/**
          if-no-files-found: warn
          retention-days: 30
